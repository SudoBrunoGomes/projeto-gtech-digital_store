services:
  # Banco de dados MySQL
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: gtech_store
      MYSQL_USER: gtech
      MYSQL_PASSWORD: gtech123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30

  # Backend API (Node.js + Express)
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: gtech
      DB_PASSWORD: gtech123
      DB_NAME: gtech_store
      JWT_SECRET: gtech-store-secret-key-2024
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (React + Vite dev server)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000/api
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysql_data:
